name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "build-and-deploy"
        type: choice
        options:
          - build-and-deploy
          - deploy-only
          - rollback
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag for deploy-only/rollback (commit SHA)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: 6d631136-intelligent-corvus.registry.twcstorage.ru
  IMAGE_PREFIX: fitnesstrainer

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.config.outputs.should_build }}
      should_deploy: ${{ steps.config.outputs.should_deploy }}
      environment: ${{ steps.config.outputs.environment }}
      image_tag: ${{ steps.config.outputs.image_tag }}
    steps:
      - name: Configure workflow
        id: config
        run: |
          SHOULD_BUILD="true"
          SHOULD_DEPLOY="true"
          IMAGE_TAG="${GITHUB_SHA}"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              ENVIRONMENT="prod"
            else
              ENVIRONMENT="dev"
            fi
          else
            ENVIRONMENT="${{ inputs.environment }}"
            case "${{ inputs.action }}" in
              "build-and-deploy") SHOULD_BUILD="true"; SHOULD_DEPLOY="true" ;;
              "deploy-only") SHOULD_BUILD="false"; SHOULD_DEPLOY="true"; IMAGE_TAG="${{ inputs.image_tag }}" ;;
              "rollback") SHOULD_BUILD="false"; SHOULD_DEPLOY="true"; IMAGE_TAG="${{ inputs.image_tag }}" ;;
            esac
          fi

          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"
          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: backend
            dockerfile: backend/Dockerfile
            target: final
            image: api
          - name: migrate
            context: backend
            dockerfile: backend/Dockerfile
            target: migrate
            image: migrate
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: frontend
          - name: bot
            context: bot
            dockerfile: bot/Dockerfile
            image: bot
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fitness.yotechnologies.ru/api
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
          labels: |
            fitnesstrainer.managed=true
            org.opencontainers.image.source=${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [ prepare, build ]
    if: |
      always() &&
      needs.prepare.outputs.should_deploy == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on:
      - self-hosted
      - linux
      - ${{ needs.prepare.outputs.environment }}
    env:
      REGISTRY: 6d631136-intelligent-corvus.registry.twcstorage.ru
      REGISTRY_USER: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set deploy directory
        run: echo "DEPLOY_DIR=/root/fitnesstrainer" >> $GITHUB_ENV
      - name: Login to registry
        run: docker login "$REGISTRY" -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD"
      - name: Update image tags in env file
        run: |
          ENV_FILE="${DEPLOY_DIR}/.env"
          BACKUP_DIR="${DEPLOY_DIR}/backups"
          mkdir -p "$BACKUP_DIR"
          cp "$ENV_FILE" "$BACKUP_DIR/.env.backup.$(date +%Y%m%d_%H%M%S)"
          ls -t "$BACKUP_DIR"/.env.backup.* 2>/dev/null | tail -n +11 | xargs -r rm
          sed -i "s|API_IMAGE=.*|API_IMAGE=${REGISTRY}/${IMAGE_PREFIX}-api:${IMAGE_TAG}|" "$ENV_FILE"
          sed -i "s|MIGRATE_IMAGE=.*|MIGRATE_IMAGE=${REGISTRY}/${IMAGE_PREFIX}-migrate:${IMAGE_TAG}|" "$ENV_FILE"
          sed -i "s|FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${REGISTRY}/${IMAGE_PREFIX}-frontend:${IMAGE_TAG}|" "$ENV_FILE"
          sed -i "s|BOT_IMAGE=.*|BOT_IMAGE=${REGISTRY}/${IMAGE_PREFIX}-bot:${IMAGE_TAG}|" "$ENV_FILE"
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
      - name: Deploy
        run: |
          make migrate ENV_FILE="${DEPLOY_DIR}/.env"
          make pull ENV_FILE="${DEPLOY_DIR}/.env"
          make up ENV_FILE="${DEPLOY_DIR}/.env"
      - name: Docker disk usage (before prune)
        run: docker system df
      - name: Prune unused Docker images
        run: |
          docker image prune -af --filter "label=fitnesstrainer.managed=true" --filter "until=${PRUNE_UNTIL}" || true
          docker builder prune -af --filter "until=${PRUNE_UNTIL}" || true
        env:
          PRUNE_UNTIL: 24h
      - name: Docker disk usage (after prune)
        run: docker system df
      - name: Rollback on failure
        if: failure()
        run: |
          echo "::warning::Deployment failed! You can rollback using workflow_dispatch with a previous image tag."
          echo "Check backup files at ${DEPLOY_DIR}/backups/"
